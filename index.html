<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Dashboard Layout</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
    body{
        background:
        radial-gradient(circle at top left,#334155,#0f172a);
        min-height:100vh;
        overflow-x:hidden;
    }

    .card-3d{
        transform-style: preserve-3d;
        transition: all .35s ease;
        cursor:pointer;
    }

    .card-3d:hover{
        transform:
            perspective(1200px)
            rotateX(6deg)
            rotateY(-6deg)
            translateY(-8px);
        box-shadow:
            0 25px 50px rgba(0,0,0,.35),
            0 0 30px rgba(255,255,255,.05);
    }

    .glass{
        backdrop-filter: blur(18px);
        background: rgba(255,255,255,.08);
        border:1px solid rgba(255,255,255,.12);
    }

    .press{
        transition:.15s;
    }

    .press:active{
        transform:scale(.95);
    }

    .floating{
        animation: float 5s ease-in-out infinite;
    }

    @keyframes float{
        0%,100%{
            transform:translateY(0);
        }
        50%{
            transform:translateY(-8px);
        }
    }

    .nav-btn.active{
        background: linear-gradient(
            135deg,
            #60a5fa,
            #8b5cf6
        );
        color:white;
        transform:translateY(-6px);
        box-shadow:0 12px 25px rgba(99,102,241,.5);
    }
</style>
</head>

<body class="text-white">

<div class="max-w-6xl mx-auto p-4 md:p-8 pb-32">

    <!-- Top Header -->
    <div class="flex justify-between items-center gap-4">

        <div class="glass rounded-full h-16 flex-1 card-3d flex items-center px-6">
            <span class="text-slate-300">Search something...</span>
        </div>

        <div class="glass rounded-full w-20 h-20 card-3d floating flex items-center justify-center">
            <span class="text-2xl">👤</span>
        </div>

    </div>

    <!-- Hero Section -->
    <div
        class="glass rounded-3xl mt-10 p-6 md:p-8 card-3d min-h-[140px] flex items-center justify-between">

        <div>
            <h2 class="text-xl md:text-3xl font-bold">
                Welcome Back
            </h2>

            <p class="text-slate-300 mt-2">
                Modern 3D interactive dashboard
            </p>
        </div>

        <button
            class="press px-6 py-3 rounded-2xl bg-slate-500 hover:bg-slate-400 font-semibold">
            Explore
        </button>
    </div>

    <!-- Two Cards -->
    <div class="grid grid-cols-2 gap-6 mt-12">

        <div
            class="glass rounded-3xl h-40 md:h-52 card-3d flex items-center justify-center">
            <div class="text-center">
                <div class="text-4xl">📊</div>
                <div class="mt-3">Analytics</div>
            </div>
        </div>

        <div
            class="glass rounded-3xl h-40 md:h-52 card-3d flex items-center justify-center">
            <div class="text-center">
                <div class="text-4xl">🚀</div>
                <div class="mt-3">Projects</div>
            </div>
        </div>

    </div>

    <!-- Large Wide Section -->
    <div
        class="glass rounded-3xl h-28 md:h-36 mt-12 card-3d flex items-center px-6">

        <div>
            <h3 class="font-bold text-lg">
                Featured Content
            </h3>

            <p class="text-slate-300 text-sm">
                Interactive information section
            </p>
        </div>

    </div>

    <!-- Lower Layout -->
    <div class="grid grid-cols-2 gap-6 mt-10">

        <!-- Left Column -->
        <div class="space-y-6">

            <div class="glass rounded-3xl h-28 card-3d p-4">
                Quick Action
            </div>

            <div class="glass rounded-3xl h-28 card-3d p-4">
                Notifications
            </div>

        </div>

        <!-- Right Tall Card -->
        <div
            class="glass rounded-3xl h-[250px] card-3d p-5 flex flex-col justify-between">

            <div>
                <h3 class="font-bold">
                    Statistics
                </h3>

                <p class="text-slate-300 text-sm mt-2">
                    Growth metrics and activity.
                </p>
            </div>

            <button
                class="press bg-indigo-500 hover:bg-indigo-400 rounded-xl py-3">
                View Details
            </button>

        </div>

    </div>

    <!-- Bottom Grid Row -->
    <div class="grid grid-cols-2 gap-4 mt-8">

        <div class="glass rounded-2xl h-20 card-3d"></div>
        <div class="glass rounded-2xl h-20 card-3d"></div>

    </div>

    <!-- Bottom Grid Row -->
    <div class="grid grid-cols-2 gap-4 mt-6">

        <div class="glass rounded-2xl h-20 card-3d"></div>
        <div class="glass rounded-2xl h-20 card-3d"></div>

    </div>

</div>

<!-- Bottom Navigation -->
<nav
class="fixed bottom-0 left-0 right-0 bg-white/10 backdrop-blur-xl border-t border-white/10">

    <div
    class="max-w-4xl mx-auto flex justify-around items-center py-4">

        <button class="nav-btn press w-16 h-16 rounded-full glass flex items-center justify-center text-xl active">
            🏠
        </button>

        <button class="nav-btn press w-16 h-16 rounded-full glass flex items-center justify-center text-xl">
            🔍
        </button>

        <button class="nav-btn press w-16 h-16 rounded-full glass flex items-center justify-center text-xl">
            ❤️
        </button>

        <button class="nav-btn press w-16 h-16 rounded-full glass flex items-center justify-center text-xl">
            ⚙️
        </button>

    </div>

</nav>

<script>

const cards = document.querySelectorAll('.card-3d');

cards.forEach(card => {

    card.addEventListener('mousemove', (e) => {

        const rect = card.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateY = ((x / rect.width) - 0.5) * 12;
        const rotateX = ((y / rect.height) - 0.5) * -12;

        card.style.transform =
            `perspective(1200px)
             rotateX(${rotateX}deg)
             rotateY(${rotateY}deg)
             translateY(-8px)`;

    });

    card.addEventListener('mouseleave', () => {
        card.style.transform = '';
    });

});


// Bottom Navigation
const navButtons = document.querySelectorAll('.nav-btn');

navButtons.forEach(btn => {

    btn.addEventListener('click', () => {

        navButtons.forEach(item =>
            item.classList.remove('active')
        );

        btn.classList.add('active');

    });

});


// Button Ripple Effect
document.querySelectorAll('button').forEach(button => {

    button.addEventListener('click', function(e){

        const ripple = document.createElement('span');

        ripple.style.position = 'absolute';
        ripple.style.width = '12px';
        ripple.style.height = '12px';
        ripple.style.borderRadius = '50%';
        ripple.style.background = 'rgba(255,255,255,.5)';
        ripple.style.left = e.offsetX + 'px';
        ripple.style.top = e.offsetY + 'px';
        ripple.style.transform = 'scale(0)';
        ripple.style.animation = 'ripple .6s ease-out';

        this.style.position='relative';
        this.style.overflow='hidden';

        this.appendChild(ripple);

        setTimeout(()=>{
            ripple.remove();
        },600);

    });

});


const style = document.createElement('style');

style.innerHTML = `
@keyframes ripple{
    to{
        transform:scale(18);
        opacity:0;
    }
}
`;

document.head.appendChild(style);

</script>

</body>
</html>
