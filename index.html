<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI Learning Dashboard — your personal AI tutor for studying, notes, quizzes and progress tracking.">

<title>AI Learning Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
font-family:'Poppins', sans-serif;
}

body{
background: radial-gradient(circle at top left,#6246ff,#0f172a);
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;
padding-bottom:120px;
}

/* Glassmorphism */
.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
box-shadow:
0 10px 40px rgba(0,0,0,.3);
}

/* Hover Glow */
.glow{
transition:.4s;
}

.glow:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:
0 0 20px #8b5cf6,
0 0 60px #6d28d9;
}

/* Button */
.btn-glow{
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
box-shadow:
0 0 25px rgba(139,92,246,.7);
transition:.3s;
position:relative;
overflow:hidden;
}

.btn-glow:hover{
transform:scale(1.05);
box-shadow:
0 0 40px #8b5cf6;
}

.btn-glow:active{
transform:scale(.95);
}

/* Card Glow */
.card-hover{
transition:.4s;
cursor:pointer;
}

.card-hover:hover{
transform:
perspective(1000px)
rotateX(6deg)
translateY(-10px);

box-shadow:
0 0 20px rgba(168,85,247,.8),
0 20px 50px rgba(0,0,0,.4);
}

/* Floating animation */
.float{
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

/* Ripple effect for buttons */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.5);
width:20px;
height:20px;
pointer-events:none;
transform:translate(-50%,-50%) scale(0);
animation:ripple-anim .5s ease-out;
}

@keyframes ripple-anim{
to{
transform:translate(-50%,-50%) scale(8);
opacity:0;
}
}

/* Visible keyboard focus states */
button:focus-visible,
input:focus-visible,
[tabindex]:focus-visible{
outline:2px solid #a78bfa;
outline-offset:3px;
}

/* Bottom nav active state */
.nav-btn{
transition:.25s;
opacity:.65;
}

.nav-btn.active,
.nav-btn:hover{
opacity:1;
color:#c4b5fd;
}

/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce){
.float,
.glow,
.card-hover,
.btn-glow{
animation:none !important;
transition:none !important;
}
}

</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-5">

<!-- Header -->
<header class="flex justify-between items-center">

<button type="button" aria-label="Open menu" class="text-white text-3xl">
<i class="fa-solid fa-bars" aria-hidden="true"></i>
</button>

<div class="flex gap-5 items-center">

<button type="button" aria-label="Notifications, 3 unread" class="relative text-white text-3xl">
<i class="fa-regular fa-bell" aria-hidden="true"></i>
<span class="absolute -top-2 right-0 bg-purple-500 rounded-full w-6 h-6 flex items-center justify-center text-sm">
3
</span>
</button>

<img src="https://i.pravatar.cc/100"
alt="Yogi's profile picture"
class="w-16 h-16 rounded-full border-2 border-purple-500">

</div>
</header>


<!-- Greeting -->
<div class="mt-10 text-white">

<h1 class="text-5xl font-bold">
Hello, Yogi 👋
</h1>

<p class="text-xl mt-3 text-gray-300">
What do you want to learn today?
</p>

</div>


<!-- Search -->
<form id="ask-ai-form" class="glass rounded-full p-3 mt-10 flex justify-between items-center glow">

<label for="ask-ai-input" class="sr-only">Ask the AI tutor a question</label>
<input
id="ask-ai-input"
name="query"
placeholder="Ask anything..."
autocomplete="off"
class="bg-transparent outline-none w-full text-white px-5">

<button type="submit" class="btn-glow px-8 py-4 rounded-full text-white font-semibold whitespace-nowrap">
🤖 Ask AI
</button>

</form>

<!-- AI response panel (hidden until first question) -->
<div id="ai-response" class="glass rounded-3xl mt-4 p-6 text-gray-200 hidden" role="status" aria-live="polite"></div>


<!-- Hero -->
<div class="glass rounded-[40px] mt-10 p-10 flex flex-col md:flex-row justify-between items-center glow">

<div>

<h1 class="text-white text-5xl font-bold">
Learn Smarter with AI
</h1>

<p class="text-gray-300 text-xl mt-5 max-w-lg">
Your personal AI tutor to explain,
practice and help you succeed.
</p>

<button type="button" id="start-learning" class="btn-glow px-10 py-4 rounded-2xl mt-8 text-white text-xl">
Start Learning →
</button>

</div>

<div class="float mt-10 md:mt-0">
<img
src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
alt="Illustration of an AI robot tutor"
class="w-80">
</div>

</div>



<!-- Categories -->
<nav aria-label="Learning categories" class="grid grid-cols-2 md:grid-cols-5 gap-5 mt-10">

<button type="button" class="category-btn glass p-8 rounded-3xl card-hover text-center text-white" data-category="Study with AI">
<span aria-hidden="true">🎓</span>
<h2 class="font-bold mt-4">Study with AI</h2>
</button>

<button type="button" class="category-btn glass p-8 rounded-3xl card-hover text-center text-white" data-category="Notes">
<span aria-hidden="true">📝</span>
<h2 class="font-bold mt-4">Notes</h2>
</button>

<button type="button" class="category-btn glass p-8 rounded-3xl card-hover text-center text-white" data-category="Quizzes">
<span aria-hidden="true">❓</span>
<h2 class="font-bold mt-4">Quizzes</h2>
</button>

<button type="button" class="category-btn glass p-8 rounded-3xl card-hover text-center text-white" data-category="Progress">
<span aria-hidden="true">📊</span>
<h2 class="font-bold mt-4">Progress</h2>
</button>

<button type="button" class="category-btn glass p-8 rounded-3xl card-hover text-center text-white" data-category="Saved">
<span aria-hidden="true">🔖</span>
<h2 class="font-bold mt-4">Saved</h2>
</button>

</nav>



<!-- Continue Learning -->
<main class="mt-16">

<div class="flex justify-between text-white">
<h1 class="text-3xl font-bold">
Continue Learning
</h1>

<button type="button" class="text-purple-300">
View All →
</button>
</div>


<div class="grid md:grid-cols-2 gap-8 mt-8">

<button type="button" class="course-card glass rounded-3xl p-8 card-hover text-left" data-course="Java Programming">

<div class="flex justify-between">

<div class="flex gap-6">

<div class="w-24 h-24 rounded-3xl bg-gradient-to-r from-cyan-400 to-green-500 flex justify-center items-center text-5xl text-white" aria-hidden="true">
&lt;/&gt;
</div>

<div>
<h2 class="text-white text-2xl font-semibold">
Java Programming
</h2>

<p class="text-gray-300 mt-2">
Variables & Data Types
</p>
</div>

</div>

<span class="text-white" aria-hidden="true">⋮</span>

</div>

<div class="w-full h-3 rounded-full bg-gray-700 mt-8" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100" aria-label="Java Programming progress">
<div class="w-[60%] h-3 rounded-full bg-purple-500"></div>
</div>

<p class="text-right mt-2 text-white">60%</p>

</button>



<button type="button" class="course-card glass rounded-3xl p-8 card-hover text-left" data-course="Biology">

<div class="flex gap-6">

<div class="w-24 h-24 rounded-3xl bg-gradient-to-r from-blue-500 to-purple-500 flex justify-center items-center text-5xl text-white" aria-hidden="true">
🧬
</div>

<div>
<h2 class="text-white text-2xl font-semibold">
Biology
</h2>

<p class="text-gray-300 mt-2">
Cell Structure
</p>
</div>

</div>

<div class="w-full h-3 rounded-full bg-gray-700 mt-8" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100" aria-label="Biology progress">
<div class="w-[40%] h-3 rounded-full bg-purple-500"></div>
</div>

<p class="text-right mt-2 text-white">
40%
</p>

</button>

</div>

</main>



<!-- Recommendations -->
<section class="mt-16">

<h1 class="text-3xl text-white font-bold mb-8">
Recommended For You
</h1>

<div class="grid md:grid-cols-3 gap-6">

<button type="button" class="category-btn glass rounded-3xl p-8 card-hover text-white" data-category="AI Tutor">
🤖 AI Tutor
</button>

<button type="button" class="category-btn glass rounded-3xl p-8 card-hover text-white" data-category="AI Notes">
📄 AI Notes
</button>

<button type="button" class="category-btn glass rounded-3xl p-8 card-hover text-white" data-category="Smart Quiz">
🎯 Smart Quiz
</button>

</div>

</section>


<!-- Bottom Navbar -->
<footer class="fixed bottom-0 left-0 w-full">

<nav aria-label="Primary" class="glass rounded-t-[40px] p-5 flex justify-around text-2xl">

<button type="button" class="nav-btn active" aria-label="Home" aria-current="page">
<i class="fa-solid fa-house" aria-hidden="true"></i>
</button>

<button type="button" class="nav-btn" aria-label="Courses">
<i class="fa-solid fa-book" aria-hidden="true"></i>
</button>

<button type="button" class="nav-btn" aria-label="AI Tutor">
<i class="fa-solid fa-robot" aria-hidden="true"></i>
</button>

<button type="button" class="nav-btn" aria-label="Progress stats">
<i class="fa-solid fa-chart-column" aria-hidden="true"></i>
</button>

<button type="button" class="nav-btn" aria-label="Profile">
<i class="fa-regular fa-user" aria-hidden="true"></i>
</button>

</nav>

</footer>

</div>

<script>

// Card click "press" effect
document.querySelectorAll('.card-hover').forEach(card=>{
  card.addEventListener('click',()=>{
    card.animate([
      { transform:'scale(1)' },
      { transform:'scale(.95)' },
      { transform:'scale(1)' }
    ],{ duration:250 });
  });
});


// Button ripple effect
document.querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('click',e=>{
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    ripple.classList.add('ripple');

    btn.appendChild(ripple);
    setTimeout(()=> ripple.remove(), 500);
  });
});


// Bottom nav: toggle active state
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>{
      b.classList.remove('active');
      b.removeAttribute('aria-current');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-current','page');
  });
});


// Category & recommendation cards: placeholder navigation feedback
document.querySelectorAll('.category-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const label = btn.dataset.category;
    showAiResponse(`Opening "${label}"… (hook this up to your real route or view)`);
  });
});


// Course cards: placeholder "resume lesson" feedback
document.querySelectorAll('.course-card').forEach(card=>{
  card.addEventListener('click',()=>{
    const course = card.dataset.course;
    showAiResponse(`Resuming "${course}" where you left off…`);
  });
});


// Start Learning button
document.getElementById('start-learning').addEventListener('click',()=>{
  showAiResponse('Let’s find the right starting point for you. Tell the AI tutor above what you’d like to learn!');
  document.getElementById('ask-ai-input').focus();
});


// Ask AI search — demo response (swap this for a real API call when ready)
document.getElementById('ask-ai-form').addEventListener('submit', e=>{
  e.preventDefault();
  const input = document.getElementById('ask-ai-input');
  const query = input.value.trim();
  if(!query) return;

  showAiResponse(`You asked: "${query}". This is a demo response — wire this form up to your AI backend to get a real answer.`);
  input.value = '';
});


function showAiResponse(text){
  const panel = document.getElementById('ai-response');
  panel.textContent = text;
  panel.classList.remove('hidden');
}

</script>

</body>
</html>
